name: Build PhpSpreadsheet vendor
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Create composer.json
        run: |
          echo '{
            "require": {
              "phpoffice/phpspreadsheet": "^3.10.5"
            },
            "config": {
              "platform": { "php": "8.2" }
            }
          }' > composer.json
      - name: Install
        run: composer install --no-dev --no-scripts --no-progress
      - name: Zip vendor
        run: zip -r phpspreadsheet_vendor.zip vendor/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: phpspreadsheet-vendor
          path: phpspreadsheet_vendor.zip
